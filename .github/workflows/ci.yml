name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --all-packages --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy (core packages)
        run: uv run mypy packages/kg_common packages/kg_schema || true
      - name: Pytest
        run: uv run pytest -q -m "not llm"

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm --dir apps/frontend install --frozen-lockfile || pnpm --dir apps/frontend install
      - name: Lint
        run: pnpm --dir apps/frontend lint || true
      - name: Typecheck
        run: pnpm --dir apps/frontend typecheck || true
      - name: Build
        run: pnpm --dir apps/frontend build

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
