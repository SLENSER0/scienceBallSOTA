repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
  # Static typing (§2.1) — scoped to package sources, permissive on 3rd-party stubs.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^packages/.*/src/.*\.py$
        additional_dependencies: [pydantic, types-PyYAML]
        args: [--ignore-missing-imports]
  # Secret scanning (§2.1/§19.9) — belt-and-braces with gitleaks above.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
  # Frontend lint (§2.1) — runs the app's eslint on changed TS/TSX.
  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd apps/frontend && pnpm -s lint'
        language: system
        files: ^apps/frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
