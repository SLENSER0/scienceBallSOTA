[project]
name = "kg-retrievers"
version = "0.1.0"
description = "Graph / vector / keyword / hybrid retrievers + GraphRAG."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "kg-common",
    "kg-schema",
    "kg-extractors",
    "kuzu>=0.7",
    "qdrant-client>=1.10",
    "fastembed>=0.3",
    "rank-bm25>=0.2",
    "numpy>=1.26",
    "networkx>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kg_retrievers"]

[tool.uv.sources]
kg-common = { workspace = true }
kg-schema = { workspace = true }
kg-extractors = { workspace = true }
