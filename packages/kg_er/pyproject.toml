[project]
name = "kg-er"
version = "0.1.0"
description = "Entity resolution (Splink/DuckDB) for Material, Equipment, Person, Lab — §8."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "kg-common",
    "kg-schema",
    "splink>=4.0",
    "duckdb>=1.0",
    "pyyaml>=6.0",
    "rapidfuzz>=3.9",
]

[project.optional-dependencies]
# pymatgen pulls scipy/spglib; composition.py degrades gracefully without it.
materials = ["pymatgen>=2024.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kg_er"]

[tool.uv.sources]
kg-common = { workspace = true }
kg-schema = { workspace = true }
