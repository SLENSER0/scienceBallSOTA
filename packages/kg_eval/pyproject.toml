[project]
name = "kg-eval"
version = "0.1.0"
description = "Evaluation harness: golden datasets, metrics, runner."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "kg-common",
    "kg-schema",
    "kg-extractors",
    "kg-retrievers",
    "agent-service",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kg_eval"]

[tool.uv.sources]
kg-common = { workspace = true }
kg-schema = { workspace = true }
kg-extractors = { workspace = true }
kg-retrievers = { workspace = true }
agent-service = { workspace = true }
