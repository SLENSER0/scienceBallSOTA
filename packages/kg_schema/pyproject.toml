[project]
name = "kg-schema"
version = "0.1.0"
description = "Domain ontology: LinkML source + Pydantic models, labels, relationships, enums."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "kg-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kg_schema"]

[tool.uv.sources]
kg-common = { workspace = true }
