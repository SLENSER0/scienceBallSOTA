[project]
name = "kg-common"
version = "0.1.0"
description = "Shared config, DTOs, deterministic IDs, logging, telemetry."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.2",
    "structlog>=24.1",
    "orjson>=3.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kg_common"]

[tool.uv.sources]

