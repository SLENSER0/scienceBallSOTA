[project]
name = "kg-extractors"
version = "0.1.0"
description = "Rule + LLM + materials extractors, unit normalization, entity resolution."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "kg-common",
    "kg-schema",
    "openai>=1.40",
    "pint>=0.23",
    "rapidfuzz>=3.9",
    "regex>=2024.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kg_extractors"]

[tool.uv.sources]
kg-common = { workspace = true }
kg-schema = { workspace = true }
