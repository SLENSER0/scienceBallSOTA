# Controlled measurement-method vocabulary (§6.7).
#
# Canonical ``method_id`` -> {canonical_ru, canonical_en, synonyms, measurand}.
# Each entry names an experimental measurement / characterization method together
# with the property or measurand it determines (``measurand``). ``synonyms`` carry
# both RU and EN surfaces (lowercased); RU stems are matched declension-insensitively
# by :func:`kg_extractors.method_vocab.detect_method`, so a stem such as ``виккерс``
# also matches ``Виккерсу`` / ``Виккерса``. Short acronyms (SEM/TEM/XRD/EDS/AAS) are
# matched on word boundaries only, never as substrings of a larger token.
#
# measurand groups: hardness | tensile_strength | phase_composition | microstructure
# | elemental_composition | concentration.

"method:vickers":
  canonical_ru: твёрдость по Виккерсу
  canonical_en: Vickers hardness
  synonyms:
    - виккерс
    - по виккерсу
    - твёрдость по виккерсу
    - vickers
    - vickers hardness
    - hv
  measurand: hardness

