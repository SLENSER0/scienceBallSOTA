# Controlled processing-operation vocabulary (§6.5).
#
# Canonical ``operation_id`` -> {canonical_ru, canonical_en, synonyms, parameters,
# domain}. Externalizes the surfaces hardcoded in
# ``kg_extractors.processing_extractor._METHODS`` (RU stems + EN words) and the
# process-parameter names in ``_PARAM_PATTERNS`` (temperature_c, duration,
# current_density, pressure, ph), and mirrors the ``kg_schema.enums`` enum
# ``ProcessingOperation`` (every enum value except ``other`` appears here; the
# heat-treatment op ``quenching`` is additionally covered).
#
# ``synonyms`` are RU/EN surface forms, folded case-insensitively at lookup.
# ``parameters`` are the typical process parameters stated near the operation.
# ``domain`` groups operations by metallurgical domain (§24.3).

electrowinning:
  canonical_ru: электроэкстракция
  canonical_en: electrowinning
  synonyms:
    - электроэкстракция
    - электролизное извлечение
    - электровыделение
    - electrowinning
    - electroextraction
    - EW
  parameters: [current_density, temperature_c, voltage, duration]
  domain: electrometallurgy

